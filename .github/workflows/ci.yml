name: CI (Environment aware)

on:
  pull_request:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      target_environment:
        description: "GitHub Environment to use"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || (github.ref == 'refs/heads/main' && 'production' || 'development') }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
